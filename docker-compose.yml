# ============================================
# STTS Root Docker Compose
# ============================================
# Spins up Backend, Frontend, and MongoDB with a single command.
# Usage: docker-compose up --build

services:
  # ── Database ─────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: stts-mongodb
    ports:
      - "27017:27017"
    volumes:
      - stts-mongo-data:/data/db
    networks:
      - stts-network

  # ── Backend ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stts-backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=stts
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-stts_production_secret_key_123}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - mongodb
    networks:
      - stts-network

  # ── Frontend ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    container_name: stts-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    depends_on:
      - backend
    networks:
      - stts-network

networks:
  stts-network:
    driver: bridge

volumes:
  stts-mongo-data:
    driver: local
